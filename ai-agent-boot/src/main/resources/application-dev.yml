server:
  port: 8099

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  datasource:
    mysql:
      username: root
      password: 123456
      url: jdbc:mysql://127.0.0.1:13306/ai-agent-station-study?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Shanghai&useSSL=true
      driver-class-name: com.mysql.cj.jdbc.Driver
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        pool-name: Retail_HikariCP
        minimum-idle: 15 #最小空闲连接数量
        idle-timeout: 180000 #空闲连接存活最大时间，默认600000（10分钟）
        maximum-pool-size: 25 #连接池最大连接数，默认是10
        auto-commit: true  #此属性控制从池返回的连接的默认自动提交行为,默认值：true
        max-lifetime: 1800000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
        connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
        connection-test-query: SELECT 1
    pgvector:
      driver-class-name: org.postgresql.Driver
      username: postgres
      password: postgres
      url: jdbc:postgresql://127.0.0.1:5432/springai
      type: com.zaxxer.hikari.HikariDataSource
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
        idle-timeout: 30000
        connection-timeout: 30000
  ai:
    openai:
      # OpenAI-compatible endpoint. 本地通过环境变量注入，避免真实 key 进入仓库。
      # 当前这组配置同时会被默认 ChatModel 和 AiAgentConfig 中的 EmbeddingModel 使用，
      # 因此不要把只支持 chat 的供应商（如 DeepSeek chat）直接填到这里，除非你确认不会跑 embedding。
      base-url: ${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      api-key: ${OPENAI_API_KEY:}
      http:
        # RAG eval long_context case (e.g. RAG-05 长 list 生成) 需要 ≥30s 余量，
        # 25s 在 DeepSeek 等慢链路上会触发 SocketTimeoutException + RetryTemplate 重试 + SSE 异常处理副作用。
        connect-timeout: 10s
        read-timeout: 120s
        response-timeout: 120s
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gemini-flash-latest}
        completions-path: /chat/completions
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:gemini-embedding-2}
          # PgVector 表结构当前是 VECTOR(1536)。gemini-embedding-2 默认 3072 维，这里显式收敛到 1536。
          dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}
    mcp:
      client:
        enabled: false
    #        stdio:
#          servers-configuration: classpath:/config/mcp-servers-config.json
    agent:
      auto-config:
        enabled: false
    rag:
      # TokenTextSplitter 5 参数化（Step 3.1 改造）
      # 默认值与 Spring AI 1.0.3 TokenTextSplitter 完全一致 → 改 0 行为
      # 调参后必须 TRUNCATE vector_store_openai + 重传文档（Step 3.4）
      chunker:
        chunk-size: 250
        min-chunk-size-chars: 109
        min-chunk-length-to-embed: 5
        max-num-chunks: 10000
        # keepSeparator=false 时把所有 System.lineSeparator()
        # 替换为空格——也就是说整个文档被压成一行，所有段落边界丢失。对 RAG 来说极其有害：embedding
        # 模型靠段落结构理解'这是一个完整概念段'，丢了换行就只能靠 token 数硬切。所以默认 true 是对的。我们这次改造保留 true，未来如果文档源是
        # markdown 表格之类不依赖换行的结构化数据，再考虑改 false。
        keep-separator: true

mybatis-plus:
  configuration:
    # 配置日志实现为标准输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:/mybatis/mapper/*.xml

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

wrench:
  task:
    job:
      enabled: false
